<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Моя визитка | Имя Фамилия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

        .company {

            border-radius: 60px;
            margin-bottom: 12px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .contact-item:active {
            background: #e2e8f0;
            transform: scale(0.97);
        }

            font-size: 22px;
            min-width: 32px;
        }
        .save-btn {
            background: linear-gradient(135deg, #e94560, #533483);
            border: none;

</head>
<body>
    <div class="card">
        <!-- КРУГЛОЕ ФОТО/ЛОГОТИП -->
        <div class="avatar">
            <!-- Вместо эмодзи поставьте своё фото, заменив <div> на <img src="ваша_ссылка.jpg" class="avatar"> -->
            👤
        </div>

        <!-- ИМЯ И ДОЛЖНОСТЬ (ЗАМЕНИТЕ НА СВОИ) -->
        <h1>Иван Петров</h1>
        <div class="title">Руководитель отдела продаж</div>
        <div class="company">ООО «Рекламные Технологии»</div>

        <!-- ТЕЛЕФОН (кликабельный) -->
        <a href="tel:+79123456789" class="contact-item">
            <span class="icon">📞</span>
            <span>+7 (912) 345-67-89</span>
        </a>

        <!-- EMAIL -->
        <a href="mailto:ivan@example.ru" class="contact-item">
            <span class="icon">✉️</span>
            <span>ivan@example.ru</span>
        </a>

        <!-- WEBSITE -->
        <a href="https://example.ru" class="contact-item" target="_blank">
            <span class="icon">🌐</span>
            <span>example.ru</span>
        </a>

        <!-- WhatsApp -->
        <a href="https://wa.me/79123456789" class="contact-item" target="_blank">
            <span class="icon">💬</span>
            <span>WhatsApp</span>
        </a>

        <!-- КНОПКА СОХРАНЕНИЯ В АДРЕСНУЮ КНИГУ -->
        <button class="save-btn" id="saveContactBtn">
            <span>📇</span> Сохранить в адресную книгу
        </button>
        <div class="footer">
            Нажмите кнопку → разрешите добавление контакта
        </div>
    </div>

    <script>
        // ДАННЫЕ ДЛЯ vCard (ЗАМЕНИТЕ НА СВОИ)
        const contactData = {
            fullName: "Иван Петров",
            phone: "+79123456789",
            email: "ivan@example.ru",
            company: "ООО «Рекламные Технологии»",
            jobTitle: "Руководитель отдела продаж",
            website: "https://example.ru"
        };

        // Функция создания vCard (контактный файл)
        function generateVCard() {
            return `BEGIN:VCARD
VERSION:3.0
FN:${contactData.fullName}
ORG:${contactData.company}
TITLE:${contactData.jobTitle}
TEL;TYPE=CELL,WORK:${contactData.phone}
EMAIL;TYPE=WORK:${contactData.email}
URL:${contactData.website}
REV:${new Date().toISOString()}
END:VCARD`;
        }

        // Обработчик кнопки
        document.getElementById("saveContactBtn").addEventListener("click", function() {
            const vcardString = generateVCard();
            const blob = new Blob([vcardString], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            // Создаём ссылку и "кликаем" по ней – это скачает .vcf
            const a = document.createElement("a");
            a.href = url;
            a.download = "contact.vcf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Доп. подсказка для пользователя
            setTimeout(() => {
                alert("Файл контакта загружен. Откройте его, чтобы добавить меня в адресную книгу.");
            }, 100);
        });
    </script>
</body>
</html>
